light:
  - &light_defaults
    platform: rgbww
    name: "Light 00 (${device_hostname})"
    id: light_0
    default_transition_length: 0s
    gamma_correct: 0
    disabled_by_default: false
    restore_mode: ALWAYS_OFF
    flash_transition_length: 0s
    constant_brightness: false
    color_interlock: false
    cold_white_color_temperature: 5700 K
    warm_white_color_temperature: 3700 K    
    red: dmx_u1_ch1
    green: dmx_u1_ch2
    blue: dmx_u1_ch3
    cold_white: dmx_u1_ch4
    warm_white: dmx_u1_ch5
    effects:
      - strobe:
          colors:
            - state: true
              duration: 500ms
              brightness: 1.0
              color_brightness: 1.0
              red: 1.0
              green: 1.0
              blue: 1.0
              white: 1.0
              cold_white: 1.0
              warm_white: 1.0
              transition_length: 0s
            - state: false
              duration: 500ms
              brightness: 1.0
              color_brightness: 1.0
              red: 1.0
              green: 1.0
              blue: 1.0
              white: 1.0
              cold_white: 1.0
              warm_white: 1.0
              transition_length: 0s
          name: Strobe
      - pulse:
          transition_length: 1s
          update_interval: 1s
          min_brightness: 0.0
          max_brightness: 1.0
          name: Pulse
      - random:
          transition_length: 7500ms
          update_interval: 10s
          name: Random
      - flicker:
          alpha: 0.95
          intensity: 0.015
          name: Flicker

  - <<: *light_defaults
    name: "Light 01 (${device_hostname})"
    id: light_1
    red: dmx_u1_ch6
    green: dmx_u1_ch7
    blue: dmx_u1_ch8
    cold_white: dmx_u1_ch9
    warm_white: dmx_u1_ch10
