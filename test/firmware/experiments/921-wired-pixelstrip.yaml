# experimentally, it appears that:
# - we are limited to basically two strips to RMT limitations, and 
# - this chip does not offer a DMA option for the RMT peripheral. 
# - IT IS IMPERATIVE that the ground line of the 5V power to the MCU be tied to the 
# ground of the 12V power to the strips. Otherwise, the data signals will not be 
# correctly received by the strips, and the colors will be all wrong. 


light:
  - &light_strip_defaults
    platform: esp32_rmt_led_strip
    chipset: ws2812
    is_wrgb: false
    default_transition_length: 0s
    # gamma_correct: 0
    effects:
      - addressable_random_twinkle:
      - addressable_fireworks:
      - addressable_fireworks:
          name: Fireworks 2
          update_interval: 32ms
          spark_probability: 30%
          use_random_color: false
          fade_out_rate: 120      
      - addressable_twinkle:
      - addressable_twinkle:
          name: Twinkle 2
          twinkle_probability: 75%
          progress_interval: 4ms      
      - addressable_scan:
      - addressable_scan:
          name: cylon eye
          move_interval: 1ms
          scan_width: 20      
      - addressable_rainbow:
      - strobe:
      - pulse:
      - addressable_color_wipe:
      - addressable_color_wipe:
          name: Color Wipe 2
          colors:
            - red: 100%
              green: 100%
              blue: 100%
              num_leds: 5
              gradient: true
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 1
          add_led_interval: 100ms
          reverse: false      
      - random:
      - flicker:
      - addressable_flicker:
      - addressable_flicker:
          name: Flicker 2
          update_interval: 16ms
          intensity: 25%      
    id: light_0_id
    name: "pixel strip 0"
    rgb_order: RGB
    pin: GPIO27
    num_leds: 1290

  - <<: *light_strip_defaults
    id: light_1_id
    name: "pixel strip 1"
    rgb_order: RGB
    pin: GPIO25
    num_leds: 1290

