# "All Device" baseline stuff here

<<: !include 
  file: /workspace/include/wemos-d1-mini-wired-baseline.yaml
  vars:
    # we explicitly set the logger baud rate to 115200 so that UART0 is allocated, and our uart components start with 
    # UART1. If we ever wanted to have 3 UARTS on a single controller, we could use the logger for that by setting the
    # logger baud rate to 0.  Then uart initialization would start with UART0.
    logger_baud_rate: "115200"
    device_friendly_name: "922-esphome wired DMX master."
    device_comment: "Wired DMX on board 922."




