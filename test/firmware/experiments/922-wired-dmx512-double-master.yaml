# two DMX universes on the same device, with 2 RGBCW fixtures (10 channels) on each universe.

external_components:
  - source: github://andyboeh/esphome-dmx512

uart:

# Leaving use of UART0 commented out here in case I ever need to remember how to utilize all 3 UARTs on a single controller.

  # - id: uart_bus0
  #   baud_rate: 250000
  #   tx_pin: 
  #     number: GPIO27   
  #     allow_other_uses: true 
  #     inverted: false
  #   stop_bits: 2
  #   data_bits: 8
  #   parity: NONE

  - id: uart_bus1
    baud_rate: 250000
    tx_pin: 
      number: GPIO25   
      allow_other_uses: true 
      inverted: false
    stop_bits: 2
    data_bits: 8
    parity: NONE
  - id: uart_bus2
    baud_rate: 250000
    tx_pin: 
      number: GPIO17   
      allow_other_uses: true 
      inverted: false
    stop_bits: 2
    data_bits: 8
    parity: NONE


dmx512:
  # - id: dmx_u0   
  #   uart_id: uart_bus0
  #   tx_pin: 
  #     number: GPIO27
  #     allow_other_uses: true # For ESPHome >= 2023.12.0
  #   uart_num: 0
  #   force_full_frames: false
  #   periodic_update: true
  #   custom_break_len: 92 # 92=default optional
  #   custom_mab_len: 12 # 12=default optional
  #   update_interval: 500 # 500=default optional

  - id: dmx_u1   
    uart_id: uart_bus1
    tx_pin: 
      number: GPIO25
      allow_other_uses: true 
    uart_num: 1
    force_full_frames: false
    periodic_update: true
    custom_break_len: 92 # 92=default optional
    custom_mab_len: 12 # 12=default optional
    update_interval: 500 # 500=default optional
  - id: dmx_u2   
    uart_id: uart_bus2
    tx_pin: 
      number: GPIO17
      allow_other_uses: true 
    uart_num: 2
    force_full_frames: false
    periodic_update: true

