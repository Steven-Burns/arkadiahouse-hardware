# this works with framework = arduino and the Seeed RGB stick
light:
  - platform: esp32_rmt_led_strip
    name: "10 node RMT Light"
    rgb_order: RGB
    pin: GPIO14
    num_leds: 10
    chipset: ws2811
    is_wrgb: false
    default_transition_length: 0.25s
    effects:
      - random:
      - pulse:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks:
      - addressable_flicker:

