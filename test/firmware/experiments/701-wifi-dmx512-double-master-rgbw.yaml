# two DMX universes on the same device, with 2 RGBCW fixtures (10 channels) on each universe.

# 2026-02-20 I can't get this to work -- the symptoms appear to me that the 
# timings are not correct, but without an oscilloscope I can't be sure. 
# perhaps fiddling with custom parameters like custom_break_len could work, but 
# I will try another board instead.

esp32:
  board: wt32-eth01
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf

external_components:
  - source: github://andyboeh/esphome-dmx512

uart:
  - id: uart_bus1
    baud_rate: 250000
    tx_pin: 
      number: GPIO5   # RXD2 of the w32-eth01
      allow_other_uses: true # For ESPHome >= 2023.12.0
      inverted: false
    stop_bits: 2
    data_bits: 8
    parity: NONE
  - id: uart_bus2
    baud_rate: 250000
    tx_pin: 
      number: GPIO17   
      allow_other_uses: true # For ESPHome >= 2023.12.0
      inverted: false
    stop_bits: 2
    data_bits: 8
    parity: NONE


dmx512:
  - id: dmx_u1   # I think this might be the name of the universe in the output elements
    uart_id: uart_bus1
    #enable_pin: GPIO33
    tx_pin: 
      number: GPIO5
      allow_other_uses: true # For ESPHome >= 2023.12.0
    uart_num: 0
    force_full_frames: true
    periodic_update: true
    custom_break_len: 92 # 92=default optional
    custom_mab_len: 12 # 12=default optional
    update_interval: 500 # 500=default optional
  - id: dmx_u2   
    uart_id: uart_bus2
    #enable_pin: GPIO33
    tx_pin: 
      number: GPIO17
      allow_other_uses: true # For ESPHome >= 2023.12.0
    uart_num: 1
    force_full_frames: false
    periodic_update: true
    custom_break_len: 92 # 92=default optional
    custom_mab_len: 12 # 12=default optional
    update_interval: 500 # 500=default optional

output:
  - platform: dmx512
    channel: 1
    universe: dmx_u1
    id: dmx_u1_ch1  
  - platform: dmx512
    channel: 2
    universe: dmx_u1
    id: dmx_u1_ch2
